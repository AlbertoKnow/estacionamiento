services:
  estacionamiento-db:
    image: postgres:16-alpine
    container_name: estacionamiento-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=estacionamiento
      - POSTGRES_USER=estacionamiento_user
      - POSTGRES_PASSWORD=***REDACTED***
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estacionamiento_user -d estacionamiento"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy

  estacionamiento-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: estacionamiento-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=estacionamiento-db
      - DB_NAME=estacionamiento
      - DB_USER=estacionamiento_user
      - DB_PASSWORD=***REDACTED***
      - QR_PRIVATE_KEY_PATH=/run/secrets/qr_private.pem
      - QR_PUBLIC_KEY_PATH=/run/secrets/qr_public.pem
    volumes:
      - ./data/static:/app/staticfiles
      - ./data/media:/app/media
      - ./secrets:/run/secrets:ro
    depends_on:
      estacionamiento-db:
        condition: service_healthy
    networks:
      - proxy

  estacionamiento-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://estacionamiento-api.albertoknow.com/api/v1
    container_name: estacionamiento-frontend
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: docker-server-network
